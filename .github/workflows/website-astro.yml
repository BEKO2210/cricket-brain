name: Website Astro CI

on:
  pull_request:
    paths:
      - 'website/astro/**'
      - '.github/workflows/website-astro.yml'
  push:
    branches: [main]
    paths:
      - 'website/astro/**'
      - '.github/workflows/website-astro.yml'

# Least-privilege: the job only needs to read the repo to check and build.
permissions:
  contents: read

jobs:
  website:
    name: Website checks and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website/astro
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Astro 6 requires Node >= 22.12.0 — stay on the current LTS line.
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/astro/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Astro type check
        run: npm run check

      - name: Pipeline and i18n tests
        run: npm run test:ci

      - name: Build website
        run: npm run build
