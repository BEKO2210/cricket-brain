name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Least-privilege: all jobs only need to read repository contents.
permissions:
  contents: read

jobs:
  test-matrix:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace
        env:
          # macOS runners may have Python newer than PyO3's max supported
          # version. The stable ABI is forward-compatible, so this is safe.
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  wasm:
    name: WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build wasm target
        run: cargo build --target wasm32-unknown-unknown

  ffi-header-sync:
    name: FFI header sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Regenerate C header
        run: cargo build -p cricket-brain-ffi
      - name: Verify header committed
        run: git diff --exit-code -- crates/ffi/include/cricket_brain.h

  no-std-check:
    name: no_std core verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build core without std
        run: cargo build -p cricket-brain-core --no-default-features

  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: cargo audit --deny warnings
