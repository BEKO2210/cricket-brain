<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0">
        <animate attributeName="offset" values="-0.5;1.5" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="15%" style="stop-color:#58a6ff;stop-opacity:0.6">
        <animate attributeName="offset" values="-0.35;1.65" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="30%" style="stop-color:#58a6ff;stop-opacity:0">
        <animate attributeName="offset" values="-0.2;1.8" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="840" height="200" fill="url(#bg)" rx="10"/>
  <!-- Animated spike train background -->
  <g opacity="0.12">
    <rect x="40" y="90" width="3" height="20" fill="#58a6ff" rx="1"><animate attributeName="height" values="20;45;20" dur="1.2s" repeatCount="indefinite"/><animate attributeName="y" values="90;77;90" dur="1.2s" repeatCount="indefinite"/></rect>
    <rect x="52" y="90" width="3" height="20" fill="#58a6ff" rx="1"><animate attributeName="height" values="20;40;20" dur="1.2s" begin="0.1s" repeatCount="indefinite"/><animate attributeName="y" values="90;80;90" dur="1.2s" begin="0.1s" repeatCount="indefinite"/></rect>
    <rect x="64" y="90" width="3" height="20" fill="#58a6ff" rx="1"><animate attributeName="height" values="20;50;20" dur="1.2s" begin="0.2s" repeatCount="indefinite"/><animate attributeName="y" values="90;75;90" dur="1.2s" begin="0.2s" repeatCount="indefinite"/></rect>
    <rect x="76" y="90" width="3" height="20" fill="#58a6ff" rx="1"><animate attributeName="height" values="20;35;20" dur="1.2s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="y" values="90;82;90" dur="1.2s" begin="0.3s" repeatCount="indefinite"/></rect>
    <rect x="88" y="90" width="3" height="20" fill="#58a6ff" rx="1"><animate attributeName="height" values="20;55;20" dur="1.2s" begin="0.4s" repeatCount="indefinite"/><animate attributeName="y" values="90;72;90" dur="1.2s" begin="0.4s" repeatCount="indefinite"/></rect>
    <!-- gap -->
    <rect x="120" y="90" width="3" height="20" fill="#3fb950" rx="1"><animate attributeName="height" values="20;60;20" dur="1.8s" begin="0.8s" repeatCount="indefinite"/><animate attributeName="y" values="90;70;90" dur="1.8s" begin="0.8s" repeatCount="indefinite"/></rect>
    <rect x="132" y="90" width="3" height="20" fill="#3fb950" rx="1"><animate attributeName="height" values="20;55;20" dur="1.8s" begin="0.9s" repeatCount="indefinite"/><animate attributeName="y" values="90;72;90" dur="1.8s" begin="0.9s" repeatCount="indefinite"/></rect>
    <rect x="144" y="90" width="3" height="20" fill="#3fb950" rx="1"><animate attributeName="height" values="20;50;20" dur="1.8s" begin="1.0s" repeatCount="indefinite"/><animate attributeName="y" values="90;75;90" dur="1.8s" begin="1.0s" repeatCount="indefinite"/></rect>
    <rect x="156" y="90" width="3" height="20" fill="#3fb950" rx="1"><animate attributeName="height" values="20;60;20" dur="1.8s" begin="1.1s" repeatCount="indefinite"/><animate attributeName="y" values="90;70;90" dur="1.8s" begin="1.1s" repeatCount="indefinite"/></rect>
    <rect x="168" y="90" width="3" height="20" fill="#3fb950" rx="1"><animate attributeName="height" values="20;45;20" dur="1.8s" begin="1.2s" repeatCount="indefinite"/><animate attributeName="y" values="90;77;90" dur="1.8s" begin="1.2s" repeatCount="indefinite"/></rect>
    <rect x="180" y="90" width="3" height="20" fill="#3fb950" rx="1"><animate attributeName="height" values="20;55;20" dur="1.8s" begin="1.3s" repeatCount="indefinite"/><animate attributeName="y" values="90;72;90" dur="1.8s" begin="1.3s" repeatCount="indefinite"/></rect>
  </g>
  <!-- Scanning line -->
  <rect x="0" y="0" width="840" height="200" fill="url(#pulse)" rx="10"/>
  <!-- Performance metrics -->
  <g filter="url(#glow)">
    <text x="420" y="52" font-family="'SF Mono','Fira Code',monospace" font-size="13" fill="#8b949e" text-anchor="middle" letter-spacing="4">NEUROMORPHIC INFERENCE ENGINE</text>
    <text x="420" y="95" font-family="'Segoe UI',system-ui,sans-serif" font-size="38" fill="#e6edf3" text-anchor="middle" font-weight="700">CricketBrain</text>
    <text x="420" y="125" font-family="'SF Mono','Fira Code',monospace" font-size="14" fill="#58a6ff" text-anchor="middle">v3.0 | 5 neurons | 97 ns/step | ~1 KB | STDP + Homeostasis | TPR 1.0</text>
  </g>
  <!-- Bottom stat boxes -->
  <g font-family="'SF Mono','Fira Code',monospace" text-anchor="middle">
    <rect x="100" y="148" width="120" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="160" y="163" font-size="10" fill="#8b949e">LATENCY</text>
    <text x="160" y="177" font-size="12" fill="#3fb950" font-weight="700">97 ns</text>
    <rect x="240" y="148" width="120" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="300" y="163" font-size="10" fill="#8b949e">MEMORY</text>
    <text x="300" y="177" font-size="12" fill="#3fb950" font-weight="700">~1 KB</text>
    <rect x="380" y="148" width="120" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="440" y="163" font-size="10" fill="#8b949e">LEARNING</text>
    <text x="440" y="177" font-size="12" fill="#3fb950" font-weight="700">STDP</text>
    <rect x="520" y="148" width="120" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="580" y="163" font-size="10" fill="#8b949e">DETECTION</text>
    <text x="580" y="177" font-size="12" fill="#3fb950" font-weight="700">TPR 1.0</text>
    <rect x="660" y="148" width="100" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="710" y="163" font-size="10" fill="#8b949e">FALSE POS</text>
    <text x="710" y="177" font-size="12" fill="#3fb950" font-weight="700">FPR 0.0</text>
  </g>
</svg>
