<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420">
  <defs>
    <style>
      @keyframes pulse-signal {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 1; }
      }
      @keyframes flow-an1 {
        0% { stroke-dashoffset: 20; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes spike-on1 {
        0%, 60% { r: 32; fill: #1a1a2e; }
        70% { r: 38; fill: #e94560; }
        80% { r: 32; fill: #e94560; }
        90% { r: 35; fill: #1a1a2e; }
        100% { r: 32; fill: #1a1a2e; }
      }
      @keyframes wave {
        0% { d: path('M 0,20 Q 10,10 20,20 T 40,20 T 60,20'); }
        50% { d: path('M 0,20 Q 10,30 20,20 T 40,20 T 60,20'); }
        100% { d: path('M 0,20 Q 10,10 20,20 T 40,20 T 60,20'); }
      }
      .bg { fill: #0d1117; }
      .neuron { stroke-width: 2.5; }
      .label { font-family: 'Segoe UI', system-ui, sans-serif; fill: #c9d1d9; }
      .label-small { font-family: 'SF Mono', 'Fira Code', monospace; fill: #8b949e; font-size: 11px; }
      .label-tiny { font-family: 'SF Mono', 'Fira Code', monospace; fill: #6e7681; font-size: 9.5px; }
      .title { font-family: 'Segoe UI', system-ui, sans-serif; fill: #e6edf3; font-size: 18px; font-weight: 600; }
      .subtitle { font-family: 'Segoe UI', system-ui, sans-serif; fill: #8b949e; font-size: 12px; }
      .synapse { stroke-width: 2; fill: none; }
      .synapse-exc { stroke: #3fb950; stroke-dasharray: 6,3; animation: flow-an1 0.8s linear infinite; }
      .synapse-inh { stroke: #f85149; stroke-dasharray: 3,4; animation: flow-an1 1.2s linear infinite; }
      .signal-dot { animation: pulse-signal 1.5s ease-in-out infinite; }
      .metric-box { fill: #161b22; stroke: #30363d; stroke-width: 1; rx: 6; }
      .metric-val { font-family: 'SF Mono', 'Fira Code', monospace; fill: #58a6ff; font-size: 13px; font-weight: 700; }
      .metric-label { font-family: 'Segoe UI', system-ui, sans-serif; fill: #8b949e; font-size: 10px; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="420" rx="12"/>

  <!-- Title -->
  <text class="title" x="400" y="32" text-anchor="middle">Muenster Circuit — Delay-Line Coincidence Detection</text>
  <text class="subtitle" x="400" y="50" text-anchor="middle">5 neurons, 6 synapses, 0.175 us/step, 944 bytes RAM</text>

  <!-- Input signal wave -->
  <g transform="translate(40, 100)">
    <text class="label-small" x="30" y="-8" text-anchor="middle">4500 Hz</text>
    <rect x="0" y="0" width="60" height="40" rx="4" fill="none" stroke="#30363d" stroke-width="1"/>
    <path d="M 5,20 Q 12,5 20,20 T 35,20 T 50,20" stroke="#58a6ff" stroke-width="1.5" fill="none" opacity="0.8">
      <animate attributeName="d"
        values="M 5,20 Q 12,5 20,20 T 35,20 T 50,20;M 5,20 Q 12,35 20,20 T 35,20 T 50,20;M 5,20 Q 12,5 20,20 T 35,20 T 50,20"
        dur="0.6s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Arrow: Input → AN1 -->
  <line x1="105" y1="120" x2="155" y2="120" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3fb950"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f85149"/>
    </marker>
  </defs>

  <!-- AN1 Neuron -->
  <circle cx="190" cy="120" r="32" class="neuron" fill="#1a1a2e" stroke="#58a6ff">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text class="label" x="190" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#58a6ff">AN1</text>
  <text class="label-tiny" x="190" y="130" text-anchor="middle">Receptor</text>

  <!-- Synapse: AN1 → LN2 (inhibitory, 3ms) -->
  <path d="M 222,120 C 280,120 280,70 370,70" class="synapse synapse-inh"/>
  <circle cx="296" cy="93" r="3" fill="#f85149" class="signal-dot"/>
  <text class="label-tiny" x="296" y="84" text-anchor="middle">3ms inh</text>

  <!-- Synapse: AN1 → LN3 (excitatory, 2ms) -->
  <path d="M 222,120 C 280,120 280,190 370,190" class="synapse synapse-exc"/>
  <circle cx="296" cy="158" r="3" fill="#3fb950" class="signal-dot" style="animation-delay: 0.3s"/>
  <text class="label-tiny" x="296" y="172" text-anchor="middle">2ms exc</text>

  <!-- Synapse: AN1 → LN5 (inhibitory, 5ms) -->
  <path d="M 222,130 C 260,160 280,280 370,280" class="synapse synapse-inh" style="animation-duration: 1.6s"/>
  <circle cx="296" cy="220" r="3" fill="#f85149" class="signal-dot" style="animation-delay: 0.6s"/>
  <text class="label-tiny" x="296" y="250" text-anchor="middle">5ms inh</text>

  <!-- LN2 Neuron (inhibitory) -->
  <circle cx="400" cy="70" r="26" class="neuron" fill="#1a1a2e" stroke="#f85149"/>
  <text class="label" x="400" y="66" text-anchor="middle" font-size="13" font-weight="600" fill="#f85149">LN2</text>
  <text class="label-tiny" x="400" y="80" text-anchor="middle">Inhibitory</text>

  <!-- LN3 Neuron (excitatory) -->
  <circle cx="400" cy="190" r="26" class="neuron" fill="#1a1a2e" stroke="#3fb950"/>
  <text class="label" x="400" y="186" text-anchor="middle" font-size="13" font-weight="600" fill="#3fb950">LN3</text>
  <text class="label-tiny" x="400" y="200" text-anchor="middle">Excitatory</text>

  <!-- LN5 Neuron (inhibitory) -->
  <circle cx="400" cy="280" r="26" class="neuron" fill="#1a1a2e" stroke="#f85149"/>
  <text class="label" x="400" y="276" text-anchor="middle" font-size="13" font-weight="600" fill="#f85149">LN5</text>
  <text class="label-tiny" x="400" y="290" text-anchor="middle">Inhibitory</text>

  <!-- Synapse: LN2 → ON1 (inhibitory, 1ms) -->
  <path d="M 426,70 C 480,70 500,140 560,160" class="synapse synapse-inh" style="animation-duration: 0.5s"/>

  <!-- Synapse: LN3 → ON1 (excitatory, 1ms) -->
  <path d="M 426,190 C 480,190 510,175 560,170" class="synapse synapse-exc" style="animation-duration: 0.5s"/>

  <!-- Synapse: LN5 → ON1 (inhibitory, 1ms) -->
  <path d="M 426,280 C 480,280 510,200 560,180" class="synapse synapse-inh" style="animation-duration: 0.5s"/>

  <!-- ON1 Output Neuron -->
  <circle cx="595" cy="170" r="32" class="neuron" fill="#1a1a2e" stroke="#e94560">
    <animate attributeName="r" values="32;38;32" dur="2.5s" repeatCount="indefinite" begin="1.5s"/>
    <animate attributeName="fill" values="#1a1a2e;#e94560;#1a1a2e" dur="2.5s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
  <text class="label" x="595" y="166" text-anchor="middle" font-size="14" font-weight="700" fill="#e94560">ON1</text>
  <text class="label-tiny" x="595" y="180" text-anchor="middle">Coincidence</text>

  <!-- Output arrow -->
  <line x1="627" y1="170" x2="680" y2="170" stroke="#e94560" stroke-width="2.5"/>
  <text class="label-small" x="710" y="165" text-anchor="middle" fill="#e94560">SPIKE</text>
  <text class="label-tiny" x="710" y="180" text-anchor="middle">if A(t)>0.7</text>
  <text class="label-tiny" x="710" y="192" text-anchor="middle">AND A(t-τ)>0.56</text>

  <!-- Gate formula box -->
  <rect x="640" y="200" width="145" height="50" class="metric-box"/>
  <text class="label-tiny" x="712" y="218" text-anchor="middle" fill="#c9d1d9">Coincidence Gate:</text>
  <text class="metric-val" x="712" y="238" text-anchor="middle" font-size="11">fire = now ∧ delayed</text>

  <!-- Bottom metrics -->
  <rect x="30" y="340" width="145" height="60" class="metric-box"/>
  <text class="metric-val" x="102" y="365" text-anchor="middle">0.175 μs</text>
  <text class="metric-label" x="102" y="385" text-anchor="middle">per step latency</text>

  <rect x="195" y="340" width="145" height="60" class="metric-box"/>
  <text class="metric-val" x="267" y="365" text-anchor="middle">944 bytes</text>
  <text class="metric-label" x="267" y="385" text-anchor="middle">total RAM (no_std)</text>

  <rect x="360" y="340" width="145" height="60" class="metric-box"/>
  <text class="metric-val" x="432" y="365" text-anchor="middle">0 training</text>
  <text class="metric-label" x="432" y="385" text-anchor="middle">hardwired topology</text>

  <rect x="525" y="340" width="145" height="60" class="metric-box"/>
  <text class="metric-val" x="597" y="365" text-anchor="middle">TPR 1.0</text>
  <text class="metric-label" x="597" y="385" text-anchor="middle">FPR 0.0 (all SNR)</text>

  <rect x="690" y="340" width="95" height="60" class="metric-box"/>
  <text class="metric-val" x="737" y="365" text-anchor="middle">5+6</text>
  <text class="metric-label" x="737" y="385" text-anchor="middle">neurons+synapses</text>

  <!-- Legend -->
  <g transform="translate(30, 280)">
    <line x1="0" y1="0" x2="25" y2="0" stroke="#3fb950" stroke-width="2" stroke-dasharray="6,3"/>
    <text class="label-tiny" x="30" y="4">Excitatory</text>
    <line x1="0" y1="16" x2="25" y2="16" stroke="#f85149" stroke-width="2" stroke-dasharray="3,4"/>
    <text class="label-tiny" x="30" y="20">Inhibitory</text>
  </g>
</svg>
